name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Ruby ${{ matrix.ruby-version }} / Rails ${{ matrix.rails-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ruby-version: ["3.2", "3.3", "3.4"]
        rails-version: ["7.1", "7.2", "8.0"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Install dependencies with Rails ${{ matrix.rails-version }}
        run: |
          gem install bundler
          bundle install --jobs 4 --retry 3

      - name: Install specific Rails version appraisal
        run: bundle exec appraisal rails-${{ matrix.rails-version }} bundle install

      - name: Install Redis
        run: sudo apt-get update && sudo apt-get install -y redis-server

      - name: Run tests
        run: bundle exec appraisal rails-${{ matrix.rails-version }} rspec

  lint:
    name: Lint (StandardRB)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Install dependencies
        run: bundle install --jobs 4 --retry 3

      - name: Run StandardRB
        run: bundle exec standardrb

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Install dependencies
        run: bundle install --jobs 4 --retry 3

      - name: Update vulnerability database
        run: bundle exec bundler-audit update

      - name: Check for vulnerabilities
        run: bundle exec bundler-audit check